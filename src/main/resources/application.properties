spring.application.name=gestcourrier
# ── Base de données ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/userapi
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver
 
# ── JPA / Hibernate ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
 
# ── Sécurité JWT ────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}                    # 32+ chars, JAMAIS en dur
app.jwt.expiration=86400000                     # 24h en ms
app.jwt.refresh-expiration=604800000            # 7j en ms
 
# ── Logging ─────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
 
# ── Actuator ────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

